name: Actualizador Directo EPG (iptv-org)

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build-epg:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar tu repositorio
      uses: actions/checkout@v4

    # Descargar la herramienta de scraping oficial
    - name: Clonar scraper iptv-org
      run: git clone --depth 1 https://github.com/iptv-org/epg.git scraper

    - name: Instalar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Instalar dependencias del scraper
      run: |
        cd scraper
        npm install

    # Ejecutar el scraper especificando las webs fuente que quieres arañar
    # Ejemplo: movistarplus.es (España), mi.tv (Latam), directv.com (USA/Latam)
    - name: Scraping de canales
      run: |
        cd scraper
        npm run grab -- --sites=movistarplus.es,mi.tv --output=../epg.xml

    - name: Subir cambios a tu repositorio
      run: |
        git config --global user.name "EPG AutoBot"
        git config --global user.email "bot@github.com"
        git add epg.xml
        git commit -m "EPG Real Autogenerada [skip ci]" || exit 0
        git push
